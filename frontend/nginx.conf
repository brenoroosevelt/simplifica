##############################################################################
# Nginx Configuration for Vue 3 SPA
#
# Configuração otimizada para Single Page Application com:
# - Gzip compression
# - Cache headers
# - SPA routing (fallback para index.html)
# - Security headers
##############################################################################

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    ##########################################################################
    # Gzip Compression
    ##########################################################################
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    ##########################################################################
    # Security Headers
    ##########################################################################
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Content Security Policy (ajuste conforme necessário)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:8080 https://accounts.google.com https://login.microsoftonline.com;" always;

    ##########################################################################
    # Logging
    ##########################################################################
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    ##########################################################################
    # Static Assets with Cache
    ##########################################################################

    # Assets with hashed filenames - cache agressivamente
    location ~* \.(?:css|js|woff|woff2|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html - nunca fazer cache (para garantir última versão)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    ##########################################################################
    # SPA Routing - Fallback para index.html
    ##########################################################################
    location / {
        try_files $uri $uri/ /index.html;
    }

    ##########################################################################
    # Health Check Endpoint
    ##########################################################################
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    ##########################################################################
    # Deny Access to Hidden Files
    ##########################################################################
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
